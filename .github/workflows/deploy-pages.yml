name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build design-system package
        run: npm run build -w packages/design-system

      - name: Build app
        run: npm run build -w apps/web
        env:
          VITE_BASE: /project_v9_korea/app/

      - name: Build design-system site
        run: npm run build -w apps/design-system-site
        env:
          VITE_BASE: /project_v9_korea/design_system/

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy
          cp -r apps/web/dist deploy/app
          cp -r apps/design-system-site/dist deploy/design_system
          cp .github/pages/index.html .github/pages/404.html deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
