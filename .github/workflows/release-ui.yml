name: Release Birdie UI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump: patch, minor, major, or exact (e.g. 0.2.0)'
        required: true
        default: 'patch'
      dry_run:
        description: 'Dry run (skip publish + tag)'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build design-system
        run: npm run build -w packages/design-system

      - name: Typecheck
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Bump version
        id: bump
        working-directory: packages/design-system
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [[ "$INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            npm version "$INPUT" --no-git-tag-version
          else
            npm version "$INPUT" --no-git-tag-version
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Version: $VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run == 'false' }}
        working-directory: packages/design-system
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: packages/design-system
        run: |
          npm publish --dry-run
          echo "### Dry run — nothing published" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit version bump & tag
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/design-system/package.json
          git commit -m "release: @reterics/birdie-ui v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
